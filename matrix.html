<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL DE ACCESO - MEMORY MATRIX</title>
    <style>
    :root {
        --neon-green: #00ff41;
        --dark-bg: #0d0208;
        --error-red: #ff3e3e;
    }

    body {
        background-color: var(--dark-bg);
        color: var(--neon-green);
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        overflow: hidden;
        text-shadow: 0 0 5px var(--neon-green);
        padding: 10px;
        box-sizing: border-box;
    }

    #terminal-header {
        margin-bottom: 15px;
        text-align: center;
    }

    #terminal-header h1 {
        font-size: 1.5rem;
        margin: 5px 0;
    }

    #terminal-header p {
        font-size: 0.9rem;
        margin: 5px 0;
    }

    .key-container {
        width: 100%;
        max-width: 400px; /* Se adapta a pantallas chicas y no se deforma en grandes */
        margin-bottom: 20px;
        box-sizing: border-box;
    }

    .key-display {
        font-size: 1.5rem; 
        border: 1px solid var(--neon-green);
        padding: 10px 15px;
        text-align: center;
        background: rgba(0, 255, 65, 0.1);
        margin-bottom: 5px;
        letter-spacing: 3px;
    }

    .timer-bar-container {
        width: 100%;
        height: 12px;
        background: rgba(0, 255, 65, 0.1);
        border: 1px solid var(--neon-green);
        overflow: hidden;
    }

    #timer-fill {
        height: 100%;
        width: 100%;
        background: var(--neon-green);
        box-shadow: 0 0 10px var(--neon-green);
    }

    #grid {
        display: grid;
        grid-gap: 8px;
        padding: 15px;
        border: 2px solid var(--neon-green);
        box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        max-width: 100%;
        box-sizing: border-box;
    }

    .cell {
        /* Usamos vmin para que los botones se calculen según el tamaño de la pantalla */
        width: 11vmin;  
        height: 11vmin; 
        max-width: 60px;  /* No crecerán más de 60px en monitores PC */
        max-height: 60px;
        min-width: 45px;  /* No se encogerán a un tamaño ilegible en móviles */
        min-height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(0, 255, 65, 0.3);
        cursor: pointer;
        user-select: none;
        transition: all 0.1s;
        font-weight: bold;
        font-size: 2.2rem; /* Ajuste automático de tipografía */
    }

    /* Media query para pantallas muy pequeñas (ajusta fuentes y tamaños críticos) */
    @media (max-width: 380px) {
        .cell {
            font-size: 1rem;
            min-width: 40px;
            min-height: 40px;
        }
        .key-display {
            font-size: 2.2rem;
        }
    }

    .cell:hover {
        background: var(--neon-green);
        color: var(--dark-bg);
    }

    .cell.correct {
        background: var(--neon-green);
        color: var(--dark-bg);
        box-shadow: 0 0 20px var(--neon-green);
    }

    .cell.error {
        background: var(--error-red);
        color: white;
        border-color: var(--error-red);
    }

    #status {
        margin-top: 15px;
        height: 30px;
        font-size: 1rem;
        font-weight: bold;
        text-align: center;
    }

    .scanline {
        width: 100%;
        height: 2px;
        background: rgba(0, 255, 65, 0.1);
        position: absolute;
        top: 0;
        animation: scan 4s linear infinite;
        pointer-events: none;
    }

    @keyframes scan {
        0% { top: 0; }
        100% { top: 100%; }
    }

    @keyframes drain {
        from { width: 100%; }
        to { width: 0%; }
    }
</style>
</head>
<body>
    <div class="scanline"></div>

    <div id="terminal-header">
        <h1>SISTEMA DE HACKEO - VERSION 45</h1>
        <h2>PRESIONA LOS CODIGOS EN EL ORDEN MOSTRADO</h2>
    </div>

    <div class="key-container">
        <div class="key-display">
            LLAVE: <span id="target-sequence">---</span>
        </div>
        <div class="timer-bar-container">
            <div id="timer-fill"></div>
        </div>
    </div>

    <div id="grid"></div>

    <div id="status"></div>

    <script>
        // --- CONFIGURACIÓN DINÁMICA ---
// Genera un tamaño de matriz aleatorio entre 4x4 y 6x6 en cada ejecución
const tamañoAleatorio = Math.floor(Math.random() * (6 - 4 + 1)) + 4;

const CONFIG = {
    elementosLlave: 3,
    tamañoMatriz: tamañoAleatorio, 
    velocidadRefresco: 18000 // 18 segundos para resolver
};

const gridElement = document.getElementById('grid');
const targetElement = document.getElementById('target-sequence');
const statusElement = document.getElementById('status');
const timerFill = document.getElementById('timer-fill');

let sequence = [];
let currentIndex = 0;
let timer;
const hexChars = "0123456789ABCDEF";

function genHex() {
    return hexChars[Math.floor(Math.random() * 16)] + hexChars[Math.floor(Math.random() * 16)];
}

function resetTimerAnimation() {
    timerFill.style.animation = 'none';
    timerFill.offsetHeight; 
    timerFill.style.animation = `drain ${CONFIG.velocidadRefresco}ms linear infinite`;
}

function initGame() {
    gridElement.style.gridTemplateColumns = `repeat(${CONFIG.tamañoMatriz}, 60px)`;
    
    sequence = [];
    for(let i=0; i < CONFIG.elementosLlave; i++) {
        sequence.push(genHex());
    }
    
    targetElement.innerText = sequence.join('-');
    currentIndex = 0;
    renderGrid();
    
    clearInterval(timer);
    startTimer();
    resetTimerAnimation();
}

function renderGrid() {
    gridElement.innerHTML = '';
    const totalCeldas = CONFIG.tamañoMatriz * CONFIG.tamañoMatriz;
    let cells = [];

    for (let i = 0; i < totalCeldas; i++) {
        cells.push(genHex());
    }

    sequence.forEach(val => {
        const pos = Math.floor(Math.random() * totalCeldas);
        cells[pos] = val;
    });

    cells.forEach(val => {
        const div = document.createElement('div');
        div.classList.add('cell');
        div.innerText = val;
        div.onclick = (e) => {
            e.stopPropagation();
            checkClick(val, div);
        };
        gridElement.appendChild(div);
    });
}

function checkClick(value, element) {
    if (value === sequence[currentIndex]) {
        element.classList.add('correct');
        currentIndex++;
        
        if (currentIndex === sequence.length) {
            statusElement.innerText = "ACCESO CONCEDIDO";
            statusElement.style.color = "var(--neon-green)";
            clearInterval(timer);
            timerFill.style.animationPlayState = 'paused';
            
            const padre = window.parent;
            if (padre && typeof padre.cerrarPuzzle === "function") {
                setTimeout(() => {
                    padre.cerrarPuzzle();
                }, 1000);
            }
        }
    } else {
        // Al detectar un error, bloquea el juego y expulsa al alumno
        element.classList.add('error');
        clearInterval(timer); // Detiene el temporizador visual
        timerFill.style.animationPlayState = 'paused';
        
        statusElement.innerText = "ACCESO COMPROMETIDO - EXPULSIÓN DE SEGURIDAD";
        statusElement.style.color = "var(--error-red)";
        
        // Invoca la desconexión forzada en index.html inmediatamente
        const padre = window.parent;
        if (padre && typeof padre.forzarCerrarSesion === "function") {
            setTimeout(() => {
                padre.forzarCerrarSesion();
            }, 1200); // Breve retraso para que alcancen a ver qué celda falló
        }
    }
}
function startTimer() {
    timer = setInterval(() => {
        clearInterval(timer);
        timerFill.style.animationPlayState = 'paused';
        statusElement.innerText = "TIEMPO AGOTADO - SISTEMA BLOQUEADO";
        statusElement.style.color = "var(--error-red)";
        
        // Si el tiempo expira, se asume que fallaron la defensa y los saca al login
        const padre = window.parent;
        if (padre && typeof padre.forzarCerrarSesion === "function") {
            setTimeout(() => {
                padre.forzarCerrarSesion();
            }, 1500);
        }
    }, CONFIG.velocidadRefresco);
}

// Iniciar el juego automáticamente al cargar
initGame();
    </script>
</body>
</html>
